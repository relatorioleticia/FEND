<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA — Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --preto: #111111;
  --cinza: #F5F5F5;
  --borda: #E2E2E2;
  --texto: #111111;
  --texto2: #666666;
  --branco: #ffffff;
  --verde: #1A7A4A;
  --verde-c: #D6F0E3;
  --vermelho: #A32D2D;
  --azul-m: #333333;
  --azul-c: #E8E8E8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cinza); color: var(--texto); min-height: 100vh; }

.header {
  background: var(--preto);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header img { height: 28px; display: block; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-user { font-size: 12px; color: rgba(255,255,255,0.5); }
.btn-sair {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  border-radius: 7px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}

.wrap { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }
.page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--texto); margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--texto2); margin-bottom: 28px; }

.card {
  background: var(--branco);
  border-radius: 12px;
  border: 1px solid var(--borda);
  padding: 28px 32px;
  margin-bottom: 20px;
}
.section {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--azul-m);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--borda);
}
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1 / -1; }
.field label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--texto2);
}
.field label .req { color: var(--vermelho); }
.field input, .field select, .field textarea {
  padding: 10px 13px;
  border: 1px solid var(--borda);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--texto);
  background: var(--cinza);
  outline: none;
  transition: border .2s;
  resize: vertical;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--preto);
  background: #fff;
}

.btn-add {
  padding: 11px 24px;
  background: var(--preto);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-add:hover { opacity: .85; }
.btn-add:disabled { opacity: .5; cursor: not-allowed; }

.hist-card {
  background: var(--branco);
  border: 1px solid var(--borda);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.hist-nome { font-weight: 600; font-size: 14px; }
.hist-meta { font-size: 12px; color: var(--texto2); margin-top: 2px; }
.tag-prod { background: var(--azul-c); color: var(--azul-m); border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--preto);
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transform: translateY(8px);
  transition: all .3s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: none; }
</style>
</head>
<body>

<script>
const _sessao = sessionStorage.getItem('saga-user');
if (!_sessao) { window.location.href = 'index.html'; }
const _user = _sessao ? JSON.parse(_sessao) : {};
if (_user.perfil !== 'comercial' && _user.perfil !== 'admin') {
  window.location.href = 'index.html';
}

function fazerLogout() {
  sessionStorage.removeItem('saga-user');
  window.location.href = 'index.html';
}
</script>

<div class="wrap">
  <div class="page-title">Novo(a) aluno(a)</div>
  <div class="page-sub">Preencha os dados da venda. O login é criado automaticamente.</div>

  <div class="card">
    <div class="section">Dados do(a) aluno(a)</div>
    <div class="grid">
      <div class="field"><label>Nome completo <span class="req">*</span></label><input type="text" id="c-nome" placeholder="Ex: Ana Paula Souza"></div>
      <div class="field"><label>WhatsApp <span class="req">*</span></label><input type="tel" id="c-wpp" placeholder="(61) 9 9999-9999"></div>
      <div class="field"><label>E-mail (para login) <span class="req">*</span></label><input type="email" id="c-email" placeholder="email@exemplo.com"></div>
      <div class="field"><label>Data de entrada <span class="req">*</span></label><input type="text" id="c-entrada" placeholder="DD/MM/AAAA"></div>
      <div class="field"><label>Instagram</label><input type="text" id="c-insta" placeholder="@usuario"></div>
    </div>
  </div>

  <div class="card">
    <div class="section">Dados da venda</div>
    <div class="grid">
      <div class="field"><label>Produto <span class="req">*</span></label>
        <select id="c-produto">
          <option value="">Selecione...</option>
          <option value="FEND">FEND</option>
          <option value="IGNIS">IGNIS</option>
          <option value="CONSULTORIA">CONSULTORIA</option>
          <option value="OUTROS">OUTROS</option>
        </select>
      </div>
      <div class="field"><label>Ciclo <span class="req">*</span></label>
        <select id="c-ciclo">
          <option value="">Selecione...</option>
          <option value="Entrada">Entrada</option>
          <option value="Renovação">Renovação</option>
        </select>
      </div>
      <div class="field"><label>Valor total (R$) <span class="req">*</span></label><input type="text" id="c-valor" placeholder="Ex: 19.970,00"></div>
      <div class="field"><label>Valor de entrada (R$)</label><input type="text" id="c-valor-entrada" placeholder="Opcional"></div>
      <div class="field"><label>Forma de pagamento <span class="req">*</span></label>
        <select id="c-pgto">
          <option value="">Selecione...</option>
          <option value="À vista no Cartão de Crédito">Cartão (à vista)</option>
          <option value="Parcelamento no Cartão de Crédito">Cartão (parcelado)</option>
          <option value="PIX">PIX</option>
          <option value="Entrada + PIX">Entrada + PIX</option>
          <option value="Boleto">Boleto</option>
        </select>
      </div>
      <div class="field full"><label>Observações</label><textarea id="c-obs" rows="3" placeholder="Indicação, negociação, condições especiais..."></textarea></div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:16px;margin-bottom:40px">
    <button class="btn-add" id="c-btn" onclick="cadastrarAluno()">Cadastrar aluno(a)</button>
    <span id="c-status" style="font-size:13px"></span>
  </div>

  <div style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:14px">Cadastros recentes</div>
  <div id="historico"><div style="text-align:center;padding:20px;color:var(--texto2);font-size:13px">Carregando...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, addDoc, getDocs, query, where, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyDaYBg9lnOD6EAgdh8Xx58d_svfx2EBLXU",
  authDomain: "fend-crm-saga.firebaseapp.com",
  projectId: "fend-crm-saga",
  storageBucket: "fend-crm-saga.firebasestorage.app",
  messagingSenderId: "130919382187",
  appId: "1:130919382187:web:e7aae8b70c87c9b98e4bee"
});
const db = getFirestore(app);

document.getElementById('header-user').textContent = _user.nome || _user.login;

function slugNome(nome) {
  return nome.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')
    .substring(0,80);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.cadastrarAluno = async function() {
  const nome = document.getElementById('c-nome').value.trim();
  const wpp = document.getElementById('c-wpp').value.trim();
  const email = document.getElementById('c-email').value.trim().toLowerCase();
  const entrada = document.getElementById('c-entrada').value.trim();
  const produto = document.getElementById('c-produto').value;
  const ciclo = document.getElementById('c-ciclo').value;
  const pgto = document.getElementById('c-pgto').value;
  const valor = document.getElementById('c-valor').value.trim();
  const status = document.getElementById('c-status');

  if (!nome || !wpp || !email || !entrada || !produto || !ciclo || !pgto || !valor) {
    status.textContent = '⚠ Preencha todos os campos obrigatórios.';
    status.style.color = 'var(--vermelho)';
    return;
  }

  const btn = document.getElementById('c-btn');
  btn.disabled = true;
  btn.textContent = 'Cadastrando...';
  status.textContent = '';

  const _id = slugNome(nome);

  try {
    // 1. Cria documento da aluna
    await setDoc(doc(db, 'alunas', _id), {
      _id, nome, wpp, email,
      insta: document.getElementById('c-insta').value.trim(),
      entrada, produto, ciclo, pgto,
      valorPago: valor,
      valorEntrada: document.getElementById('c-valor-entrada').value.trim(),
      obs: document.getElementById('c-obs').value.trim(),
      nasc:'', cpf:'', rg:'', end:'',
      eng:'', risco:'', fin:'', semaforo:'verde',
      drive:'', obsMar:'', obsDia:'', status:'ativo',
      encontros:[], sessoes:[],
      onboarding:{plataforma:'',aula0:'',grupo:'',form:'',termo:''},
      cavs:{M0:'',M1:'',M2:'',M3:'',M4:'',M5:'',M6:'',M7:'',M8:''},
      progresso:{},
      _cadastradoPorComercial: true,
      _cadastradoEm: new Date().toISOString(),
    });

    // 2. Cria login automático
    const qLogin = query(collection(db, 'usuarios'), where('login', '==', email));
    const snapLogin = await getDocs(qLogin);
    if (snapLogin.empty) {
      await addDoc(collection(db, 'usuarios'), {
        login: email,
        senha: 'FEND123',
        perfil: 'aluno',
        nome,
        alunaId: _id,
        criadoEm: new Date().toISOString(),
        primeiroAcesso: true,
      });
    }

    status.textContent = `✓ ${nome} cadastrado(a)! Login: ${email} / Senha: FEND123`;
    status.style.color = 'var(--verde)';

    ['c-nome','c-wpp','c-email','c-entrada','c-insta','c-valor','c-valor-entrada','c-obs'].forEach(id => document.getElementById(id).value = '');
    ['c-produto','c-ciclo','c-pgto'].forEach(id => document.getElementById(id).value = '');

    renderHistorico();
    setTimeout(() => { status.textContent = ''; }, 8000);
  } catch(e) {
    console.error(e);
    status.textContent = '✗ Erro ao cadastrar. Tente novamente.';
    status.style.color = 'var(--vermelho)';
  }

  btn.disabled = false;
  btn.textContent = 'Cadastrar aluno(a)';
};

async function renderHistorico() {
  const el = document.getElementById('historico');
  try {
    const snap = await getDocs(query(collection(db, 'alunas'), where('_cadastradoPorComercial', '==', true)));
    if (snap.empty) {
      el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--texto2);font-size:13px">Nenhum cadastro ainda.</div>';
      return;
    }
    const docs = [];
    snap.forEach(d => docs.push(d.data()));
    docs.sort((a,b) => (b._cadastradoEm||'').localeCompare(a._cadastradoEm||''));
    el.innerHTML = docs.slice(0,20).map(a => `
      <div class="hist-card">
        <div>
          <div class="hist-nome">${a.nome}</div>
          <div class="hist-meta">${a.wpp} · R$ ${a.valorPago||'—'} · ${a.pgto||'—'}</div>
          <div class="hist-meta">Entrada: ${a.entrada||'—'} · ${a.email||'sem e-mail'}</div>
        </div>
        <span class="tag-prod">${a.produto||'—'}</span>
      </div>
    `).join('');
  } catch(e) {
    console.error(e);
    el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--vermelho);font-size:13px">Erro ao carregar histórico.</div>';
  }
}

renderHistorico();
</script>
</body>
</html>
