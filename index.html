<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 24px;
  }
  .box {
    background: #fff;
    border-radius: 16px;
    padding: 48px 44px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    text-align: center;
  }
  .logo { height: 44px; margin-bottom: 8px; }
  .sub {
    font-size: 11px;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }
  .field { text-align: left; margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #111;
    outline: none;
    transition: border .2s;
    background: #fafafa;
  }
  .field input:focus { border-color: #111; background: #fff; }
  .btn {
    width: 100%;
    padding: 13px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .error {
    color: #c0392b;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
    text-align: center;
  }
  .footer { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 24px; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

  <div class="sub">Área restrita</div>
  <div class="field">
    <label>E-mail ou usuário</label>
    <input type="text" id="login" placeholder="seu@email.com" autocomplete="username">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btn-entrar" onclick="entrar()">Entrar</button>
  <div class="error" id="erro"></div>
</div>
<div class="footer">SAGA © 2025</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, query, where, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyDaYBg9lnOD6EAgdh8Xx58d_svfx2EBLXU",
  authDomain: "fend-crm-saga.firebaseapp.com",
  projectId: "fend-crm-saga",
  storageBucket: "fend-crm-saga.firebasestorage.app",
  messagingSenderId: "130919382187",
  appId: "1:130919382187:web:e7aae8b70c87c9b98e4bee"
});
const db = getFirestore(app);

// Se já tiver sessão, redireciona
const sessao = sessionStorage.getItem('saga-user');
if (sessao) {
  const u = JSON.parse(sessao);
  window.location.href = u.perfil === 'aluno' ? 'area-aluno.html' : 'painel.html';
}

window.entrar = async function() {
  const login = document.getElementById('login').value.trim().toLowerCase();
  const senha = document.getElementById('senha').value;
  const erro = document.getElementById('erro');
  const btn = document.getElementById('btn-entrar');

  if (!login || !senha) { erro.textContent = 'Preencha e-mail e senha.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Entrando...';
  erro.textContent = '';

  try {
    const q = query(collection(db, 'usuarios'),
      where('login', '==', login),
      where('senha', '==', senha));
    const snap = await getDocs(q);

    if (snap.empty) {
      erro.textContent = 'E-mail ou senha incorretos.';
      btn.disabled = false;
      btn.innerHTML = 'Entrar';
      return;
    }

    const user = { id: snap.docs[0].id, ...snap.docs[0].data() };
    sessionStorage.setItem('saga-user', JSON.stringify(user));

    if (user.perfil === 'aluno') {
      window.location.href = 'area-aluno.html';
    } else {
      window.location.href = 'painel.html';
    }
  } catch(e) {
    console.error(e);
    erro.textContent = 'Erro de conexão. Tente novamente.';
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
  }
};

document.getElementById('senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.entrar();
});
document.getElementById('login').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('senha').focus();
});
</script>
</body>
</html>
