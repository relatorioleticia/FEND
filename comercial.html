<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA — Cadastro de Novos(as)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #111111; --azul-m: #333333; --azul-c: #E8E8E8;
    --verde: #1A7A4A; --verde-c: #D6F0E3;
    --vermelho: #A32D2D; --vermelho-c: #FDEAEA;
    --cinza: #F5F7FA; --borda: #E2E8F0; --texto: #1A2035; --texto2: #5A6580; --branco: #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cinza); color: var(--texto); min-height: 100vh; }

  .login-overlay { position: fixed; inset: 0; background: var(--azul); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
  .login-overlay.hidden { display: none; }
  .login-box { background: #fff; border-radius: 16px; padding: 48px 40px 40px; width: 360px; box-shadow: 0 24px 60px rgba(0,0,0,0.25); text-align: center; }
  .login-logo { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--azul); letter-spacing: 3px; margin-bottom: 4px; }
  .login-sub { font-size: 11px; color: var(--texto2); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 36px; }
  .login-field { width: 100%; padding: 12px 14px; border: 1px solid var(--borda); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--texto); margin-bottom: 12px; outline: none; transition: border .2s; }
  .login-field:focus { border-color: var(--azul-m); }
  .login-btn { width: 100%; padding: 13px; background: var(--azul); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .login-btn:hover { background: var(--azul-m); }
  .login-error { color: var(--vermelho); font-size: 13px; margin-top: 12px; min-height: 18px; }
  .login-version { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 20px; }

  .header { background: var(--azul); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .header-logo { font-family: 'DM Serif Display', serif; font-size: 24px; color: #fff; letter-spacing: 2px; }
  .header-logo span { font-family: 'DM Sans', sans-serif; font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-user { font-size: 12px; color: rgba(255,255,255,0.5); }
  .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); border-radius: 7px; padding: 6px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

  .page { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--azul); margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--texto2); margin-bottom: 32px; }

  .card { background: var(--branco); border-radius: 12px; border: 1px solid var(--borda); padding: 28px 32px; margin-bottom: 20px; }
  .section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--azul-m); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--borda); }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--texto2); }
  .field label .req { color: var(--azul-m); }
  .field input, .field select, .field textarea { padding: 10px 13px; border: 1px solid var(--borda); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--texto); background: var(--cinza); outline: none; transition: border .2s, background .2s; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--azul-m); background: #fff; }
  .field input::placeholder { color: #A0AABA; }

  .submit-area { display: flex; align-items: center; gap: 16px; margin-top: 8px; }
  .btn-submit { padding: 13px 32px; background: var(--azul); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-submit:hover { background: var(--azul-m); }
  .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
  .status-ok { font-size: 13px; color: var(--verde); }
  .status-err { font-size: 13px; color: var(--vermelho); }

  .hist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .hist-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--azul); }
  .hist-count { font-size: 11px; color: var(--texto2); background: var(--branco); border: 1px solid var(--borda); border-radius: 20px; padding: 3px 12px; }
  .entry { background: var(--branco); border: 1px solid var(--borda); border-radius: 10px; padding: 14px 18px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .entry-nome { font-size: 14px; font-weight: 600; color: var(--texto); }
  .entry-meta { font-size: 12px; color: var(--texto2); margin-top: 2px; }
  .entry-badge { display: inline-block; background: var(--azul-c); color: var(--azul); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; margin-top: 5px; }
  .entry-obs { font-size: 12px; color: var(--texto2); font-style: italic; margin-top: 4px; }
  .entry-date { font-size: 11px; color: var(--texto2); text-align: right; white-space: nowrap; }
  .empty-hist { text-align: center; padding: 32px; color: var(--texto2); font-size: 13px; }
  .loading-msg { text-align:center; padding:20px; color:var(--texto2); font-size:13px; }

  @media (max-width: 560px) { .field-grid { grid-template-columns: 1fr; } .card { padding: 20px 16px; } }
</style>
</head>

<div class="page">
  <div class="page-title">Novo(a) aluno(a)</div>
  <div class="page-sub">Preencha os dados essenciais da venda. Os dados cadastrais completos virão via formulário.</div>

  <div class="card">
    <div class="section-title">Dados do(a) aluno(a)</div>
    <div class="field-grid">
      <div class="field"><label>Nome completo <span class="req">*</span></label><input type="text" id="f-nome" placeholder="Ex: Ana Paula Souza"></div>
      <div class="field"><label>WhatsApp <span class="req">*</span></label><input type="tel" id="f-wpp" placeholder="(61) 9 9999-9999"></div>
      <div class="field"><label>Data de entrada <span class="req">*</span></label><input type="text" id="f-entrada" placeholder="DD/MM/AAAA"></div>
      <div class="field"><label>Instagram</label><input type="text" id="f-insta" placeholder="@usuario"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Dados da venda</div>
    <div class="field-grid">
      <div class="field"><label>Produto <span class="req">*</span></label>
        <select id="f-produto">
          <option value="">Selecione...</option>
          <option value="FEND">FEND</option>
          <option value="IGNIS">IGNIS</option>
          <option value="CONSULTORIA">CONSULTORIA</option>
          <option value="OUTROS">OUTROS</option>
        </select>
      </div>
      <div class="field"><label>Ciclo <span class="req">*</span></label>
        <select id="f-ciclo">
          <option value="">Selecione...</option>
          <option value="Entrada">Entrada</option>
          <option value="Renovação">Renovação</option>
        </select>
      </div>
      <div class="field"><label>Valor total (R$) <span class="req">*</span></label><input type="text" id="f-valor" placeholder="Ex: 19.970,00"></div>
      <div class="field"><label>Valor de entrada (R$)</label><input type="text" id="f-valor-entrada" placeholder="Ex: 3.000,00"></div>
      <div class="field"><label>Forma de pagamento <span class="req">*</span></label>
        <select id="f-pgto">
          <option value="">Selecione...</option>
          <option value="À vista no Cartão de Crédito">Cartão de crédito (à vista)</option>
          <option value="Parcelamento no Cartão de Crédito">Cartão de crédito (parcelado)</option>
          <option value="PIX">PIX</option>
          <option value="Entrada + Parcelamento no PIX">Entrada + Parcelamento no PIX</option>
          <option value="Boleto">Boleto</option>
          <option value="Transferência">Transferência</option>
        </select>
      </div>
      <div class="field full"><label>Observações</label><textarea id="f-obs" rows="3" placeholder="Indicação, negociação, condições especiais..."></textarea></div>
    </div>
  </div>

  <div class="submit-area">
    <button class="btn-submit" id="btn-submit" onclick="cadastrarAluna()">Cadastrar aluna</button>
    <span id="status-msg"></span>
  </div>

  <div style="margin-top:48px">
    <div class="hist-header">
      <div class="hist-title">Cadastros recentes</div>
      <div class="hist-count" id="hist-count">—</div>
    </div>
    <div id="hist-list"><div class="loading-msg">Carregando...</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, query, orderBy, limit, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDaYBg9lnOD6EAgdh8Xx58d_svfx2EBLXU",
  authDomain: "fend-crm-saga.firebaseapp.com",
  projectId: "fend-crm-saga",
  storageBucket: "fend-crm-saga.firebasestorage.app",
  messagingSenderId: "130919382187",
  appId: "1:130919382187:web:e7aae8b70c87c9b98e4bee"
};

const fbApp = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(fbApp);

// ── LOGIN ─────────────────────────────────────────────────────────────────────
const USUARIOS = [
  { usuario: 'comercial', senha: 'fend2025', nome: 'Comercial' },
];

window.fazerLogin = function() {
  const u = document.getElementById('login-user').value.trim();
  const s = document.getElementById('login-pass').value;
  const match = USUARIOS.find(x => x.usuario.toLowerCase() === u.toLowerCase() && x.senha === s);
  if (match) {
    localStorage.setItem('fend-comercial-auth', match.usuario);
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('header-user').textContent = match.nome;
    iniciarHistorico();
  } else {
    document.getElementById('login-error').textContent = 'Usuário ou senha incorretos.';
    document.getElementById('login-pass').value = '';
  }
};
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') window.fazerLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pass').focus(); });

window.fazerLogout = function() {
  localStorage.removeItem('fend-comercial-auth');
  location.reload();
};

(function verificar() {
  const auth = localStorage.getItem('fend-comercial-auth');
  const match = auth ? USUARIOS.find(x => x.usuario === auth) : null;
  if (match) {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('header-user').textContent = match.nome;
    iniciarHistorico();
  }
})();

// ── UTILITÁRIO ────────────────────────────────────────────────────────────────
function slugNome(nome) {
  return nome.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')
    .substring(0,80);
}

// ── CADASTRO ──────────────────────────────────────────────────────────────────
window.cadastrarAluna = async function() {
  const nome    = document.getElementById('f-nome').value.trim();
  const wpp     = document.getElementById('f-wpp').value.trim();
  const produto = document.getElementById('f-produto').value;
  const ciclo   = document.getElementById('f-ciclo').value;
  const pgto    = document.getElementById('f-pgto').value;
  const valor   = document.getElementById('f-valor').value.trim();

  const entrada = document.getElementById('f-entrada').value.trim();
  if (!nome || !wpp || !entrada || !produto || !ciclo || !pgto || !valor) {
    mostrarStatus('err', '⚠ Preencha todos os campos obrigatórios.');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Cadastrando...';
  mostrarStatus('', '');

  const hoje = new Date().toLocaleDateString('pt-BR');
  const _id = slugNome(nome);

  const novaAluna = {
    _id, nome, wpp,
    email:   '',
    insta:   document.getElementById('f-insta').value.trim(),
    nasc:    '',
    cpf:     '',
    rg:      '',
    end:     '',
    entrada: document.getElementById('f-entrada').value.trim(),
    produto, pgto, ciclo,
    valorPago: valor,
    valorEntrada: document.getElementById('f-valor-entrada').value.trim(),
    eng:'', risco:'', fin:'',
    obs:     document.getElementById('f-obs').value.trim(),
    obsMar:'', semaforo:'verde', drive:'',
    encontros:[], sessoes:[],
    onboarding:{plataforma:'',aula0:'',grupo:'',form:'',termo:''},
    cavs:{M0:'',M1:'',M2:'',M3:'',M4:'',M5:'',M6:'',M7:'',M8:''},
    _cadastradoPorComercial: true,
    _cadastradoEm: new Date().toISOString(),
  };

  try {
    await setDoc(doc(db, 'alunas', _id), novaAluna);

    ['f-nome','f-wpp','f-insta','f-entrada','f-valor','f-valor-entrada','f-obs']
      .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('f-produto').value = '';
    document.getElementById('f-ciclo').value = '';
    document.getElementById('f-pgto').value = '';

    mostrarStatus('ok', `✓ ${nome} cadastrada! Já aparece no painel pedagógico.`);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch(err) {
    console.error(err);
    mostrarStatus('err', '✗ Erro ao cadastrar. Verifique a conexão e tente novamente.');
  }

  btn.disabled = false;
  btn.textContent = 'Cadastrar aluna';
};

function mostrarStatus(tipo, msg) {
  const el = document.getElementById('status-msg');
  el.className = tipo === 'ok' ? 'status-ok' : tipo === 'err' ? 'status-err' : '';
  el.textContent = msg;
  if (tipo === 'ok') setTimeout(() => { el.textContent=''; el.className=''; }, 6000);
}

// ── HISTÓRICO ─────────────────────────────────────────────────────────────────
function iniciarHistorico() {
  const q = query(collection(db, 'alunas'));
  onSnapshot(q, (snap) => {
    document.getElementById('hist-count').textContent = `${snap.size} alunas no painel`;

    const comerciais = [];
    snap.forEach(d => {
      const data = d.data();
      if (data._cadastradoPorComercial) comerciais.push(data);
    });

    comerciais.sort((a,b) => (b._cadastradoEm||'').localeCompare(a._cadastradoEm||''));

    const el = document.getElementById('hist-list');
    if (!comerciais.length) {
      el.innerHTML = '<div class="empty-hist">Nenhum cadastro feito por aqui ainda.</div>';
      return;
    }

    el.innerHTML = comerciais.map(h => {
      const dt = h._cadastradoEm ? new Date(h._cadastradoEm).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'}) : '—';
      return `<div class="entry">
        <div>
          <div class="entry-nome">${h.nome}</div>
          <div class="entry-meta">${h.wpp}${h.valorPago ? ' · R$ ' + h.valorPago : ''}${h.pgto ? ' · ' + h.pgto : ''}</div>
          <div class="entry-meta">Entrada: ${h.entrada||'—'}</div>
          ${h.produto ? `<div class="entry-badge">${h.produto}</div>` : ''}
          ${h.obs ? `<div class="entry-obs">${h.obs}</div>` : ''}
        </div>
        <div class="entry-date">${dt}</div>
      </div>`;
    }).join('');
  });
}
</script>
</body>
</html>
