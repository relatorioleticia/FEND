<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA — Painel de Mentoras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --preto: #111111; --cinza: #F5F5F5; --borda: #E2E2E2;
    --texto: #111111; --texto2: #666666; --branco: #ffffff;
    --verde: #1A7A4A; --verde-c: #D6F0E3;
    --amarelo: #B5850A; --amarelo-c: #FFF3CD;
    --vermelho: #A32D2D; --vermelho-c: #FDEAEA;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cinza); color: var(--texto); min-height: 100vh; }

  .login-overlay { position: fixed; inset: 0; background: var(--preto); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
  .login-overlay.hidden { display: none; }
  .login-box { background: #fff; border-radius: 16px; padding: 48px 40px 40px; width: 360px; box-shadow: 0 24px 60px rgba(0,0,0,0.3); text-align: center; }
  .login-field { width: 100%; padding: 12px 14px; border: 1px solid var(--borda); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--texto); margin-bottom: 12px; outline: none; }
  .login-field:focus { border-color: var(--preto); }
  .login-btn { width: 100%; padding: 13px; background: var(--preto); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login-error { color: var(--vermelho); font-size: 13px; margin-top: 10px; min-height: 18px; }

  .header { background: var(--preto); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
  .header-logo { height: 28px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-user { font-size: 12px; color: rgba(255,255,255,0.5); }
  .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); border-radius: 7px; padding: 6px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

  .page { max-width: 960px; margin: 0 auto; padding: 36px 24px 80px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--preto); margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--texto2); margin-bottom: 28px; }

  .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--borda); background: var(--branco); font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .filter-btn.active { background: var(--preto); color: #fff; border-color: var(--preto); }

  .resposta-card {
    background: var(--branco); border-radius: 12px; border: 1px solid var(--borda);
    padding: 20px 24px; margin-bottom: 12px;
  }
  .resp-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .resp-aluna { font-weight: 600; font-size: 15px; }
  .resp-ativ { font-size: 13px; color: var(--texto2); margin-top: 2px; }
  .resp-data { font-size: 11px; color: var(--texto2); white-space: nowrap; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-enviado { background: var(--amarelo-c); color: var(--amarelo); }
  .badge-avaliacao { background: #E8E8FF; color: #4040CC; }
  .badge-devolvido { background: var(--verde-c); color: var(--verde); }

  .resp-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--borda); }
  .btn-primary { padding: 8px 16px; background: var(--preto); color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
  .btn-secondary { padding: 8px 16px; background: var(--cinza); color: var(--preto); border: 1px solid var(--borda); border-radius: 7px; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-verde { padding: 8px 16px; background: var(--verde); color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }

  .devolver-area { background: var(--cinza); border-radius: 8px; padding: 14px; margin-top: 10px; display: none; }
  .devolver-area.open { display: block; }
  .devolver-row { display: flex; gap: 8px; margin-top: 8px; }
  .devolver-input { flex: 1; padding: 9px 12px; border: 1px solid var(--borda); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .devolver-input:focus { border-color: var(--preto); }

  .empty-state { text-align: center; padding: 60px; color: var(--texto2); }
  .loading { text-align: center; padding: 60px; color: var(--texto2); font-size: 13px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--preto); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all .3s; z-index: 999; }
  .toast.show { opacity: 1; transform: none; }
</style>
</head>

</header>

<div class="page">
  <div class="page-title">Entregas das Alunas</div>
  <div class="page-sub">Baixe as respostas, corrija e devolva com anotações.</div>

  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
    <button class="filter-btn" onclick="filtrar('enviado', this)">📤 Aguardando avaliação</button>
    <button class="filter-btn" onclick="filtrar('em_avaliacao', this)">🔍 Em avaliação</button>
    <button class="filter-btn" onclick="filtrar('devolvido', this)">✓ Devolvidos</button>
  </div>

  <div id="respostas-lista"><div class="loading">Carregando...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const USUARIOS_MENTORAS = [
  { usuario: 'mentora', senha: 'saga2025', nome: 'Mentora' },
  { usuario: 'Leticia', senha: 'Saga123', nome: 'Letícia' },
];

function fazerLogin() {
  const u = document.getElementById('login-user').value.trim();
  const s = document.getElementById('login-pass').value;
  const match = USUARIOS_MENTORAS.find(x => x.usuario.toLowerCase() === u.toLowerCase() && x.senha === s);
  if (match) {
    localStorage.setItem('saga-mentora-auth', match.usuario);
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('header-user').textContent = match.nome;
  } else {
    document.getElementById('login-error').textContent = 'Usuário ou senha incorretos.';
    document.getElementById('login-pass').value = '';
  }
}

function fazerLogout() {
  localStorage.removeItem('saga-mentora-auth');
  location.reload();
}

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') fazerLogin(); });

(function() {
  const auth = localStorage.getItem('saga-mentora-auth');
  const match = auth ? USUARIOS_MENTORAS.find(x => x.usuario === auth) : null;
  if (match) {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('header-user').textContent = match.nome;
  }
})();
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDocs, updateDoc, query, orderBy, onSnapshot, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDaYBg9lnOD6EAgdh8Xx58d_svfx2EBLXU",
  authDomain: "fend-crm-saga.firebaseapp.com",
  projectId: "fend-crm-saga",
  storageBucket: "fend-crm-saga.firebasestorage.app",
  messagingSenderId: "130919382187",
  appId: "1:130919382187:web:e7aae8b70c87c9b98e4bee"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);

let todasRespostas = [];
let filtroAtual = 'todos';

// Listener em tempo real
const q = query(collection(db, 'respostas'), orderBy('enviadoEm', 'desc'));
onSnapshot(q, async (snap) => {
  todasRespostas = [];
  const ativCache = {};

  for (const d of snap.docs) {
    const r = { id: d.id, ...d.data() };
    // Busca titulo da atividade
    if (!ativCache[r.atividadeId]) {
      try {
        const aSnap = await getDoc(doc(db, 'atividades', r.atividadeId));
        ativCache[r.atividadeId] = aSnap.exists() ? aSnap.data().titulo : 'Atividade';
      } catch(e) { ativCache[r.atividadeId] = 'Atividade'; }
    }
    r.atividadeTitulo = ativCache[r.atividadeId];
    todasRespostas.push(r);
  }
  renderRespostas();
});

function renderRespostas() {
  const el = document.getElementById('respostas-lista');
  const lista = filtroAtual === 'todos' ? todasRespostas : todasRespostas.filter(r => r.status === filtroAtual);

  if (!lista.length) {
    el.innerHTML = '<div class="empty-state">Nenhuma entrega encontrada.</div>';
    return;
  }

  el.innerHTML = lista.map(r => {
    const dt = r.enviadoEm ? new Date(r.enviadoEm).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'}) : '—';
    const badgeCls = r.status === 'devolvido' ? 'badge-devolvido' : r.status === 'em_avaliacao' ? 'badge-avaliacao' : 'badge-enviado';
    const badgeTxt = r.status === 'devolvido' ? '✓ Devolvido' : r.status === 'em_avaliacao' ? '🔍 Em avaliação' : '📤 Aguardando';

    const btnBaixar = r.linkResposta
      ? `<a href="${r.linkResposta}" target="_blank" class="btn-primary">⬇ Ver resposta</a>`
      : '';
    const btnAvaliar = r.status === 'enviado'
      ? `<button class="btn-secondary" onclick="marcarEmAvaliacao('${r.id}')">🔍 Iniciar avaliação</button>` : '';
    const btnDevolver = r.status !== 'devolvido'
      ? `<button class="btn-secondary" onclick="toggleDevolver('devolver-${r.id}')">📤 Devolver corrigido</button>` : '';
    const btnCorrigido = r.linkCorrigido
      ? `<a href="${r.linkCorrigido}" target="_blank" class="btn-secondary">📄 Ver corrigido</a>` : '';

    return `<div class="resposta-card">
      <div class="resp-header">
        <div>
          <div class="resp-aluna">${r.alunoNome || r.alunaId}</div>
          <div class="resp-ativ">${r.atividadeTitulo}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="badge ${badgeCls}">${badgeTxt}</span>
          <span class="resp-data">${dt}</span>
        </div>
      </div>
      <div class="resp-actions">
        ${btnBaixar}${btnCorrigido}${btnAvaliar}${btnDevolver}
      </div>
      <div class="devolver-area" id="devolver-${r.id}">
        <div style="font-size:12px;color:var(--texto2)">Cole o link do Drive com o arquivo corrigido:</div>
        <div class="devolver-row">
          <input type="url" class="devolver-input" id="corrigido-${r.id}" placeholder="https://drive.google.com/...">
          <button class="btn-verde" onclick="devolverCorrigido('${r.id}')">Devolver</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.filtrar = function(status, btn) {
  filtroAtual = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRespostas();
};

window.marcarEmAvaliacao = async function(id) {
  await updateDoc(doc(db, 'respostas', id), { status: 'em_avaliacao' });
  showToast('Marcado como em avaliação.');
};

window.toggleDevolver = function(id) {
  document.getElementById(id).classList.toggle('open');
};

window.devolverCorrigido = async function(id) {
  const link = document.getElementById('corrigido-' + id).value.trim();
  if (!link) { showToast('Cole o link antes de devolver.'); return; }
  await updateDoc(doc(db, 'respostas', id), { linkCorrigido: link, status: 'devolvido', devolvidoEm: new Date().toISOString() });
  showToast('Devolvido com sucesso!');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
