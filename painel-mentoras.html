<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA — Mentoras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --preto: #111111;
  --cinza: #F5F5F5;
  --borda: #E2E2E2;
  --texto: #111111;
  --texto2: #666666;
  --branco: #ffffff;
  --verde: #1A7A4A;
  --verde-c: #D6F0E3;
  --amarelo: #B5850A;
  --amarelo-c: #FFF3CD;
  --azul-m: #333333;
  --azul-c: #E8E8E8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cinza); color: var(--texto); min-height: 100vh; }

.header {
  background: var(--preto);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header img { height: 28px; display: block; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-user { font-size: 12px; color: rgba(255,255,255,0.5); }
.btn-sair {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  border-radius: 7px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}

.wrap { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
.page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--texto); margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--texto2); margin-bottom: 24px; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--borda);
  background: var(--branco);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
  color: var(--texto2);
}
.filter-btn:hover { background: #fafafa; }
.filter-btn.active {
  background: var(--preto);
  color: #fff;
  border-color: var(--preto);
}

.resp-card {
  background: var(--branco);
  border-radius: 12px;
  border: 1px solid var(--borda);
  padding: 20px 24px;
  margin-bottom: 12px;
}
.resp-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.resp-nome { font-weight: 600; font-size: 15px; }
.resp-ativ { font-size: 13px; color: var(--texto2); margin-top: 2px; }
.resp-data { font-size: 11px; color: var(--texto2); margin-top: 4px; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-amber { background: var(--amarelo-c); color: var(--amarelo); }
.badge-blue { background: #E8E8FF; color: #4040CC; }
.badge-green { background: var(--verde-c); color: var(--verde); }

.resp-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--borda);
}
.btn-primary {
  padding: 8px 14px;
  background: var(--preto);
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-secondary {
  padding: 8px 14px;
  background: var(--cinza);
  color: var(--preto);
  border: 1px solid var(--borda);
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-verde {
  padding: 8px 14px;
  background: var(--verde);
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}
.btn-corrigido {
  padding: 8px 14px;
  background: var(--verde-c);
  color: var(--verde);
  border: 1px solid var(--verde);
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.devolver-area {
  background: var(--cinza);
  border-radius: 8px;
  padding: 14px;
  margin-top: 10px;
  display: none;
}
.devolver-area.open { display: block; }
.devolver-row { display: flex; gap: 8px; margin-top: 8px; }
.devolver-input {
  flex: 1;
  padding: 9px 12px;
  border: 1px solid var(--borda);
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
}

.empty-state {
  text-align: center;
  padding: 60px;
  color: var(--texto2);
  background: var(--branco);
  border: 1px solid var(--borda);
  border-radius: 12px;
}
.empty-icon { font-size: 36px; margin-bottom: 12px; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--preto);
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transform: translateY(8px);
  transition: all .3s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: none; }
</style>
</head>
<body>

<script>
const _sessao = sessionStorage.getItem('saga-user');
if (!_sessao) { window.location.href = 'index.html'; }
const _user = _sessao ? JSON.parse(_sessao) : {};
if (_user.perfil !== 'mentora' && _user.perfil !== 'admin') {
  window.location.href = 'index.html';
}

function fazerLogout() {
  sessionStorage.removeItem('saga-user');
  window.location.href = 'index.html';
}
</script>

<div class="wrap">
  <div class="page-title">Entregas das alunas</div>
  <div class="page-sub">Baixe as respostas, corrija e devolva com anotações.</div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
    <button class="filter-btn" onclick="filtrar('enviado', this)">📤 Aguardando</button>
    <button class="filter-btn" onclick="filtrar('em_avaliacao', this)">🔍 Em avaliação</button>
    <button class="filter-btn" onclick="filtrar('devolvido', this)">✓ Devolvidos</button>
  </div>

  <div id="lista"><div class="empty-state">Carregando...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, updateDoc, query, orderBy, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyDaYBg9lnOD6EAgdh8Xx58d_svfx2EBLXU",
  authDomain: "fend-crm-saga.firebaseapp.com",
  projectId: "fend-crm-saga",
  storageBucket: "fend-crm-saga.firebasestorage.app",
  messagingSenderId: "130919382187",
  appId: "1:130919382187:web:e7aae8b70c87c9b98e4bee"
});
const db = getFirestore(app);

document.getElementById('header-user').textContent = _user.nome || _user.login;

let _todas = [];
let _filtro = 'todos';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Listener em tempo real
onSnapshot(query(collection(db, 'respostas'), orderBy('enviadoEm', 'desc')), async (snap) => {
  _todas = [];
  const cache = {};
  for (const d of snap.docs) {
    const r = { id: d.id, ...d.data() };
    if (!cache[r.atividadeId]) {
      try {
        const as = await getDoc(doc(db, 'atividades', r.atividadeId));
        cache[r.atividadeId] = as.exists() ? as.data().titulo : 'Atividade';
      } catch(e) { cache[r.atividadeId] = 'Atividade'; }
    }
    r.atividadeTitulo = cache[r.atividadeId];
    _todas.push(r);
  }
  renderLista();
});

function renderLista() {
  const el = document.getElementById('lista');
  const lista = _filtro === 'todos' ? _todas : _todas.filter(r => r.status === _filtro);

  if (!lista.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div style="font-size:14px;font-weight:600;color:var(--texto);margin-bottom:4px">Nenhuma entrega</div>
      <div style="font-size:13px">Quando as alunas enviarem respostas, aparecerão aqui.</div>
    </div>`;
    return;
  }

  el.innerHTML = lista.map(r => {
    const dt = r.enviadoEm ? new Date(r.enviadoEm).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'}) : '—';
    const badgeCls = r.status === 'devolvido' ? 'badge-green' : r.status === 'em_avaliacao' ? 'badge-blue' : 'badge-amber';
    const badgeTxt = r.status === 'devolvido' ? '✓ Devolvido' : r.status === 'em_avaliacao' ? '🔍 Em avaliação' : '📤 Aguardando';

    const btnVer = r.linkResposta ? `<a href="${r.linkResposta}" target="_blank" class="btn-primary">⬇ Ver resposta</a>` : '';
    const btnCorr = r.linkCorrigido ? `<a href="${r.linkCorrigido}" target="_blank" class="btn-corrigido">📄 Ver corrigido</a>` : '';
    const btnAval = r.status === 'enviado' ? `<button class="btn-secondary" onclick="marcarAvaliacao('${r.id}')">🔍 Iniciar avaliação</button>` : '';
    const btnDev = r.status !== 'devolvido' ? `<button class="btn-secondary" onclick="toggleDevolver('dev-${r.id}')">📤 Devolver corrigido</button>` : '';

    return `<div class="resp-card">
      <div class="resp-header">
        <div>
          <div class="resp-nome">${r.alunoNome||r.alunaId}</div>
          <div class="resp-ativ">${r.atividadeTitulo}</div>
        </div>
        <div style="text-align:right">
          <span class="badge ${badgeCls}">${badgeTxt}</span>
          <div class="resp-data">${dt}</div>
        </div>
      </div>
      <div class="resp-actions">${btnVer}${btnCorr}${btnAval}${btnDev}</div>
      <div class="devolver-area" id="dev-${r.id}">
        <div style="font-size:12px;color:var(--texto2)">Cole o link do Drive com o arquivo corrigido:</div>
        <div class="devolver-row">
          <input type="url" class="devolver-input" id="cor-${r.id}" placeholder="https://drive.google.com/...">
          <button class="btn-verde" onclick="devolverCorrigido('${r.id}')">Devolver</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.filtrar = function(s, btn) {
  _filtro = s;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
};

window.marcarAvaliacao = async function(id) {
  await updateDoc(doc(db, 'respostas', id), { status: 'em_avaliacao' });
  showToast('Marcado como em avaliação');
};

window.toggleDevolver = function(id) {
  document.getElementById(id).classList.toggle('open');
};

window.devolverCorrigido = async function(id) {
  const link = document.getElementById('cor-' + id).value.trim();
  if (!link) { showToast('Cole o link antes de devolver.'); return; }
  await updateDoc(doc(db, 'respostas', id), {
    linkCorrigido: link,
    status: 'devolvido',
    devolvidoEm: new Date().toISOString()
  });
  showToast('Devolvido com sucesso!');
};
</script>
</body>
</html>
