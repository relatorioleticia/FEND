<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA — Área do Aluno(a)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --preto: #111111;
    --cinza-escuro: #1e1e1e;
    --cinza: #F5F5F5;
    --borda: #E2E2E2;
    --texto: #111111;
    --texto2: #666666;
    --branco: #ffffff;
    --verde: #1A7A4A;
    --verde-c: #D6F0E3;
    --amarelo: #B5850A;
    --amarelo-c: #FFF3CD;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cinza); color: var(--texto); min-height: 100vh; }

  /* NAV */
  .topbar {
    background: var(--preto);
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { height: 28px; }
  .topbar-user {
    display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
  }
  .topbar-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: #333; object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 600;
    overflow: hidden; flex-shrink: 0;
  }
  .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* TABS */
  .tabs {
    background: var(--branco);
    border-bottom: 1px solid var(--borda);
    display: flex;
    padding: 0 32px;
    gap: 4px;
  }
  .tab {
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--texto2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--texto); }
  .tab.active { color: var(--preto); border-bottom: 2px solid var(--preto); }

  /* CONTENT */
  .content { max-width: 860px; margin: 0 auto; padding: 36px 24px 80px; }
  .page { display: none; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--branco);
    border-radius: 12px;
    border: 1px solid var(--borda);
    padding: 24px 28px;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--preto);
    margin-bottom: 4px;
  }
  .card-sub { font-size: 13px; color: var(--texto2); margin-bottom: 16px; }

  /* ATIVIDADE CARD */
  .ativ-card {
    background: var(--branco);
    border-radius: 12px;
    border: 1px solid var(--borda);
    padding: 20px 24px;
    margin-bottom: 12px;
  }
  .ativ-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .ativ-titulo { font-weight: 600; font-size: 15px; color: var(--preto); }
  .ativ-desc { font-size: 13px; color: var(--texto2); margin-top: 2px; line-height: 1.5; }
  .ativ-modulo { font-size: 11px; background: #f0f0f0; color: var(--texto2); border-radius: 4px; padding: 2px 8px; font-weight: 500; white-space: nowrap; }
  .badge-status { font-size: 11px; font-weight: 600; border-radius: 20px; padding: 3px 10px; white-space: nowrap; }
  .badge-pendente { background: #F5F5F5; color: #666; }
  .badge-enviado { background: var(--amarelo-c); color: var(--amarelo); }
  .badge-devolvido { background: var(--verde-c); color: var(--verde); }

  .ativ-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--borda); }
  .btn-download {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: var(--preto); color: #fff;
    border: none; border-radius: 7px; font-size: 12px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none;
    transition: opacity .2s;
  }
  .btn-download:hover { opacity: .8; }
  .btn-secondary {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: var(--cinza); color: var(--preto);
    border: 1px solid var(--borda); border-radius: 7px; font-size: 12px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none;
    transition: background .2s;
  }
  .btn-secondary:hover { background: #eee; }

  /* UPLOAD RESPOSTA */
  .upload-area {
    background: var(--cinza);
    border: 1px dashed #ccc;
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 10px;
    display: none;
  }
  .upload-area.open { display: block; }
  .upload-label { font-size: 12px; color: var(--texto2); margin-bottom: 6px; }
  .upload-row { display: flex; gap: 8px; }
  .upload-input {
    flex: 1; padding: 9px 12px;
    border: 1px solid var(--borda); border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--texto); background: #fff; outline: none;
  }
  .upload-input:focus { border-color: var(--preto); }
  .btn-enviar {
    padding: 9px 16px; background: var(--verde); color: #fff;
    border: none; border-radius: 7px; font-size: 12px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }

  /* JORNADA */
  .modulo-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 0; border-bottom: 1px solid var(--borda);
  }
  .modulo-item:last-child { border-bottom: none; }
  .modulo-num {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--preto); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 16px;
    flex-shrink: 0;
  }
  .modulo-num.done { background: var(--verde); }
  .modulo-num.current { background: var(--preto); box-shadow: 0 0 0 3px rgba(0,0,0,0.15); }
  .modulo-info { flex: 1; }
  .modulo-nome { font-weight: 600; font-size: 14px; }
  .modulo-desc { font-size: 12px; color: var(--texto2); margin-top: 2px; }
  .modulo-cav { font-size: 11px; font-weight: 600; }
  .cav-ok { color: var(--verde); }
  .cav-pend { color: var(--amarelo); }
  .cav-no { color: #bbb; }

  /* PERFIL */
  .perfil-foto-area {
    display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
  }
  .perfil-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: #e0e0e0; object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 600; color: #999;
    overflow: hidden; flex-shrink: 0;
  }
  .perfil-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .btn-foto {
    padding: 8px 16px; background: var(--cinza); color: var(--texto);
    border: 1px solid var(--borda); border-radius: 7px; font-size: 13px;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field label { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--texto2); }
  .field input, .field textarea {
    padding: 10px 13px; border: 1px solid var(--borda); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--texto);
    background: var(--cinza); outline: none; transition: border .2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--preto); background: #fff; }
  .btn-salvar {
    padding: 11px 24px; background: var(--preto); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: var(--texto2); font-size: 13px; }
  .empty-state { text-align: center; padding: 48px; color: var(--texto2); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--preto); color: #fff;
    padding: 12px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transform: translateY(8px);
    transition: all .3s; z-index: 999;
  }
  .toast.show { opacity: 1; transform: none; }

  /* NOT FOUND */
  .not-found {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; text-align: center;
    color: var(--texto2);
  }

  @media (max-width: 560px) {
    .tabs { padding: 0 16px; overflow-x: auto; }
    .content { padding: 24px 16px 60px; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>

<div id="not-found" style="display:none" class="not-found">
  <div style="font-size:48px;margin-bottom:16px">🔒</div>
  <div style="font-size:18px;font-weight:600;color:#111;margin-bottom:8px">Link inválido</div>
  <div style="font-size:14px">Este link não existe ou foi removido.</div>
</div>

<div id="app" style="display:none">
  <nav class="topbar">
    <img id="nav-logo" src="" alt="SAGA" class="topbar-logo">
    <div class="topbar-user">
      <span id="nav-nome">...</span>
      <div class="topbar-avatar" id="nav-avatar-wrap">
        <span id="nav-initials"></span>
      </div>
    </div>
  </nav>

  <div class="tabs">
    <button class="tab active" onclick="showTab('jornada', this)">🗺 Jornada</button>
    <button class="tab" onclick="showTab('atividades', this)">📋 Atividades</button>
    <button class="tab" onclick="showTab('espaco', this)">✨ Espaço SAGA</button>
    <button class="tab" onclick="showTab('perfil', this)">👤 Meu Perfil</button>
  </div>

  <div class="content">

    <!-- JORNADA -->
    <div id="page-jornada" class="page active">
      <div class="card">
        <div class="card-title">Sua Jornada</div>
        <div class="card-sub">Acompanhe seu progresso pelos módulos do programa.</div>
        <div id="jornada-lista"><div class="loading">Carregando...</div></div>
      </div>
    </div>

    <!-- ATIVIDADES -->
    <div id="page-atividades" class="page">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:24px;color:var(--preto)">Atividades</div>
          <div style="font-size:13px;color:var(--texto2);margin-top:2px">Baixe, responda e envie de volta.</div>
        </div>
      </div>
      <div id="ativ-lista"><div class="loading">Carregando...</div></div>
    </div>

    <!-- ESPAÇO SAGA -->
    <div id="page-espaco" class="page">
      <div class="card" style="text-align:center;padding:48px">
        <div style="font-size:36px;margin-bottom:12px">✨</div>
        <div class="card-title">Espaço SAGA</div>
        <div class="card-sub" style="margin-bottom:0">Em breve teremos novidades aqui para você.</div>
      </div>
    </div>

    <!-- PERFIL -->
    <div id="page-perfil" class="page">
      <div class="card">
        <div class="card-title" style="margin-bottom:20px">Meu Perfil</div>
        <div class="perfil-foto-area">
          <div class="perfil-avatar" id="perfil-avatar">
            <span id="perfil-initials"></span>
          </div>
          <div>
            <div style="font-size:13px;color:var(--texto2);margin-bottom:8px">Foto de perfil (URL de imagem)</div>
            <input type="url" id="perfil-foto-url" placeholder="https://..." style="padding:8px 12px;border:1px solid var(--borda);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;width:260px;outline:none">
            <button onclick="atualizarFoto()" style="margin-left:8px;padding:8px 14px;background:var(--cinza);border:1px solid var(--borda);border-radius:7px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Aplicar</button>
          </div>
        </div>
        <div class="field">
          <label>Nome</label>
          <input type="text" id="perfil-nome" placeholder="Seu nome completo">
        </div>
        <div class="field">
          <label>Instagram</label>
          <input type="text" id="perfil-insta" placeholder="@usuario">
        </div>
        <div class="field">
          <label>Uma frase sua (opcional)</label>
          <textarea id="perfil-frase" rows="2" placeholder="Ex: Construindo minha estratégia digital..."></textarea>
        </div>
        <button class="btn-salvar" onclick="salvarPerfil()">Salvar alterações</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

// Get aluno ID from URL
const params = new URLSearchParams(window.location.search);
const alunoId = params.get('id');

let alunoData = null;

async function init() {
  if (!alunoId) { showNotFound(); return; }

  // Set logo
  document.getElementById('nav-logo').src = LOGO_B64;

  const alunoRef = doc(db, 'alunas', alunoId);
  const alunoSnap = await getDoc(alunoRef);

  if (!alunoSnap.exists()) { showNotFound(); return; }

  alunoData = { _id: alunoSnap.id, ...alunoSnap.data() };

  // Show app
  document.getElementById('not-found').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Set nav
  const nome = alunoData.perfilNome || alunoData.nome || 'Aluno(a)';
  const initials = nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
  document.getElementById('nav-nome').textContent = nome.split(' ')[0];
  document.getElementById('nav-initials').textContent = initials;
  if (alunoData.perfilFoto) {
    document.getElementById('nav-avatar-wrap').innerHTML = `<img src="${alunoData.perfilFoto}" onerror="this.parentElement.innerHTML='${initials}'">`;
  }

  renderJornada();
  renderAtividades();
  preencherPerfil();
}

function showNotFound() {
  document.getElementById('not-found').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── JORNADA ───────────────────────────────────────────────────────────────────
function renderJornada() {
  const cavs = alunoData.cavs || {};
  const el = document.getElementById('jornada-lista');
  el.innerHTML = MODULOS.map((m, i) => {
    const v = cavs[m.id] || '';
    const done = v === 'sim';
    const pend = v === 'pend';
    const cavClass = done ? 'cav-ok' : pend ? 'cav-pend' : 'cav-no';
    const cavLabel = done ? '✓ CAV entregue' : pend ? '⏳ CAV em avaliação' : '○ CAV pendente';
    return `<div class="modulo-item">
      <div class="modulo-num ${done ? 'done' : ''}">${i}</div>
      <div class="modulo-info">
        <div class="modulo-nome">${m.nome} — ${m.desc}</div>
        <div class="modulo-desc"><span class="modulo-cav ${cavClass}">${cavLabel}</span></div>
      </div>
    </div>`;
  }).join('');
}

// ── ATIVIDADES ────────────────────────────────────────────────────────────────
async function renderAtividades() {
  const el = document.getElementById('ativ-lista');
  el.innerHTML = '<div class="loading">Carregando atividades...</div>';

  // Busca atividades gerais + individuais desta aluna
  const qGeral = query(collection(db, 'atividades'),
    where('tipo', '==', 'geral'), orderBy('criadoEm', 'desc'));
  const qIndiv = query(collection(db, 'atividades'),
    where('tipo', '==', 'individual'), where('alunaId', '==', alunoId), orderBy('criadoEm', 'desc'));

  const [snapGeral, snapIndiv] = await Promise.all([getDocs(qGeral), getDocs(qIndiv)]);

  const atividades = [];
  snapGeral.forEach(d => atividades.push({ id: d.id, ...d.data() }));
  snapIndiv.forEach(d => atividades.push({ id: d.id, ...d.data() }));

  if (!atividades.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma atividade disponível ainda.</div></div>';
    return;
  }

  // Busca respostas desta aluna
  const qResp = query(collection(db, 'respostas'), where('alunaId', '==', alunoId));
  const snapResp = await getDocs(qResp);
  const respostas = {};
  snapResp.forEach(d => { respostas[d.data().atividadeId] = { id: d.id, ...d.data() }; });

  el.innerHTML = atividades.map(a => {
    const resp = respostas[a.id];
    const status = resp ? resp.status : 'pendente';
    const badgeCls = status === 'devolvido' ? 'badge-devolvido' : status === 'enviado' || status === 'em_avaliacao' ? 'badge-enviado' : 'badge-pendente';
    const badgeTxt = status === 'devolvido' ? '✓ Devolvida corrigida' : status === 'enviado' ? '📤 Enviada' : status === 'em_avaliacao' ? '🔍 Em avaliação' : 'Pendente';

    const downloadBtn = a.linkPdf
      ? `<a href="${a.linkPdf}" target="_blank" class="btn-download">⬇ Baixar atividade</a>`
      : '';

    const corrigidoBtn = resp && resp.linkCorrigido
      ? `<a href="${resp.linkCorrigido}" target="_blank" class="btn-secondary">📄 Ver corrigido</a>`
      : '';

    const uploadBtn = status === 'pendente' || status === ''
      ? `<button class="btn-secondary" onclick="toggleUpload('upload-${a.id}')">📤 Enviar resposta</button>`
      : '';

    return `<div class="ativ-card">
      <div class="ativ-header">
        <div>
          <div class="ativ-titulo">${a.titulo}</div>
          <div class="ativ-desc">${a.descricao || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="badge-status ${badgeCls}">${badgeTxt}</span>
          ${a.modulo ? `<span class="ativ-modulo">${a.modulo}</span>` : ''}
        </div>
      </div>
      <div class="ativ-actions">
        ${downloadBtn}${corrigidoBtn}${uploadBtn}
      </div>
      <div class="upload-area" id="upload-${a.id}">
        <div class="upload-label">Cole o link do Google Drive com sua resposta:</div>
        <div class="upload-row">
          <input type="url" class="upload-input" id="link-${a.id}" placeholder="https://drive.google.com/...">
          <button class="btn-enviar" onclick="enviarResposta('${a.id}', '${resp ? resp.id : ''}')">Enviar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.toggleUpload = function(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
};

window.enviarResposta = async function(atividadeId, respostaId) {
  const link = document.getElementById('link-' + atividadeId).value.trim();
  if (!link) { showToast('Cole o link do Drive antes de enviar.'); return; }

  try {
    if (respostaId) {
      await updateDoc(doc(db, 'respostas', respostaId), { linkResposta: link, status: 'enviado', enviadoEm: new Date().toISOString() });
    } else {
      await addDoc(collection(db, 'respostas'), {
        alunaId, atividadeId,
        alunoNome: alunoData.nome,
        linkResposta: link,
        status: 'enviado',
        linkCorrigido: '',
        enviadoEm: new Date().toISOString(),
      });
    }
    showToast('Atividade enviada com sucesso!');
    renderAtividades();
  } catch(e) {
    console.error(e);
    showToast('Erro ao enviar. Tente novamente.');
  }
};

// ── PERFIL ────────────────────────────────────────────────────────────────────
function preencherPerfil() {
  document.getElementById('perfil-nome').value = alunoData.perfilNome || alunoData.nome || '';
  document.getElementById('perfil-insta').value = alunoData.perfilInsta || alunoData.insta || '';
  document.getElementById('perfil-frase').value = alunoData.perfilFrase || '';
  document.getElementById('perfil-foto-url').value = alunoData.perfilFoto || '';
  const initials = (alunoData.nome||'A').split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
  document.getElementById('perfil-initials').textContent = initials;
  if (alunoData.perfilFoto) {
    document.getElementById('perfil-avatar').innerHTML = `<img src="${alunoData.perfilFoto}" onerror="this.innerHTML='${initials}'">`;
  }
}

window.atualizarFoto = function() {
  const url = document.getElementById('perfil-foto-url').value.trim();
  const initials = (alunoData.nome||'A').split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
  if (url) {
    document.getElementById('perfil-avatar').innerHTML = `<img src="${url}" onerror="this.innerHTML='${initials}'">`;
  }
};

window.salvarPerfil = async function() {
  const updates = {
    perfilNome: document.getElementById('perfil-nome').value.trim(),
    perfilInsta: document.getElementById('perfil-insta').value.trim(),
    perfilFrase: document.getElementById('perfil-frase').value.trim(),
    perfilFoto: document.getElementById('perfil-foto-url').value.trim(),
  };
  try {
    await updateDoc(doc(db, 'alunas', alunoId), updates);
    Object.assign(alunoData, updates);
    // Update nav
    const nome = updates.perfilNome || alunoData.nome;
    document.getElementById('nav-nome').textContent = nome.split(' ')[0];
    if (updates.perfilFoto) {
      const initials = nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
      document.getElementById('nav-avatar-wrap').innerHTML = `<img src="${updates.perfilFoto}" onerror="this.parentElement.innerHTML='${initials}'">`;
    }
    showToast('Perfil salvo!');
  } catch(e) {
    showToast('Erro ao salvar.');
  }
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
window.showTab = function(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  btn.classList.add('active');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
